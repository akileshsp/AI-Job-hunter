<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AI Job Hunter Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container py-5">

<h1 class="mb-4">

🚀 AI Job Hunter Dashboard

</h1>

<div class="row g-4">

<div class="col-md-3">

<div class="card shadow">

<div class="card-body text-center">

<h2>{{ total_jobs }}</h2>

<p>Total Jobs</p>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow">

<div class="card-body text-center">

<h2>{{ saved_jobs }}</h2>

<p>Saved Jobs</p>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow">

<div class="card-body text-center">

<h2>{{ applied_jobs }}</h2>

<p>Applied Jobs</p>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow">

<div class="card-body text-center">

<h2>{{ profile_score }}%</h2>

<p>Resume Score</p>

</div>

</div>

</div>

</div>

<div class="mt-5">

<a href="/" class="btn btn-primary">

Home

</a>

<a href="/results" class="btn btn-success">

Search Jobs

</a>

<a href="/saved" class="btn btn-warning">

Saved Jobs

</a>

</div>

</div>

</body>

</html>
