<!DOCTYPE html>
<html>

<head>

    <title>Login - AI Job Hunter</title>

    <link rel="stylesheet"
          href="/static/style.css">

</head>

<body>

<div class="container">

    <h1>🤖 AI Job Hunter</h1>

    <h2>Login</h2>

    {% with messages = get_flashed_messages() %}

        {% if messages %}

            <div class="error">

                {{ messages[0] }}

            </div>

        {% endif %}

    {% endwith %}

    <form method="POST">

        <input
            type="email"
            name="email"
            placeholder="Email"
            required>

        <br><br>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required>

        <br><br>

        <button type="submit">

            Login

        </button>

    </form>

    <br>

    <a href="/register">

        Create Account

    </a>

</div>

</body>

</html>
