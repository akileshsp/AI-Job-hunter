<!DOCTYPE html>
<html>

<head>

    <title>Register - AI Job Hunter</title>

    <link rel="stylesheet"
          href="/static/style.css">

</head>

<body>

<div class="container">

    <h1>🤖 AI Job Hunter</h1>

    <h2>Create Account</h2>

    {% with messages = get_flashed_messages() %}

        {% if messages %}

            <div class="error">

                {{ messages[0] }}

            </div>

        {% endif %}

    {% endwith %}

    <form method="POST">

        <input
            type="text"
            name="name"
            placeholder="Full Name"
            required>

        <br><br>

        <input
            type="email"
            name="email"
            placeholder="Email"
            required>

        <br><br>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required>

        <br><br>

        <button type="submit">

            Register

        </button>

    </form>

    <br>

    <a href="/login">

        Already have an account?

    </a>

</div>

</body>

</html>
